version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: aws-optimizer-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: aws_optimizer
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - aws-optimizer-network

  mongo-express:
    image: mongo-express:latest
    container_name: aws-optimizer-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://root:password@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - aws-optimizer-network

  localstack:
    image: localstack/localstack:latest
    container_name: aws-optimizer-localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      SERVICES: ec2,iam,elasticbeanstalk,apigateway,cloudformation
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - aws-optimizer-network

volumes:
  mongodb_data:
  mongodb_config:
  localstack_data:

networks:
  aws-optimizer-network:
    driver: bridge
